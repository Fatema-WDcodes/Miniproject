<!DOCTYPE html>
<html>
<head>
    <title>Smart Task Manager</title>
   <style>
    body {
        background-color: bisque;
    font-family:'Times New Roman', Tahoma, serif;
    background-color: #f2f2f2;
   
    display:flex;
            justify-content: center;
            align-items: center;
            margin-top:30px;
}


.board{

    width: 400px;
    margin: 50px auto;
    background: rgb(209, 188, 188);
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 0px 10px gray;
  text-align: center;
  color:#a76a6a;
   
}

input {
    padding: 8px;
    width: 60%;
    border-radius: 10px;
    
    
}

button {
    padding: 8px 12px;
    cursor: pointer;
    border-radius:10px;
    margin:10px;
    background-color: #a76a6a;
}
button:hover {
    background-color: #c67710;
}
ul {
    list-style-type: none;
    padding: 0;
}

li {
    margin: 10px 0;
    padding: 8px;
    background: #e6e6e6;
    border-radius: 5px;
    text-align:center;
}

  .dark{
            background-color: black;
          
        }
        .dark .board{
            background-color: rgba(79, 78, 78, 0.47);}
            .dark h1,h3{
                color:rgb(244, 239, 239);
            }
         
        
        .dark.li{
            background-color: rgba(81, 81, 81, 0.1);
             color:rgb(244, 239, 239);
             padding: 10px;
            
        }
        .dark.button{
            background-color: rgba(78, 3, 32, 0.679);
        }
         .dark button:hover{
            background-color: rgba(85, 79, 10, 0.664);}
       
   </style>
</head>

<body id="body" class="">

    <div class="board">
       
        <h1>Smart Task Manager</h1>
      
        <input type="text" id="taskInput" placeholder="Enter your task">
        <button  id="add" onclick="addTask()">Add Task</button>
     

        <p id="msg"></p>

        <ul id="List"></ul>

        <h3>Total Tasks: <span id="totalTasks">0</span></h3>
        
        <button onclick="darkmode()">💡</button>

    </div>

   
    <script>
        let tasks = [];

    function addTask() {
    let input = document.getElementById("taskInput");
    let message = document.getElementById("msg");
    let value= input.value;

    
    if (value === "") 
    {
        message.innerHTML = "<span style='color:red'>Please enter a task</span>";
        return;
    }
    tasks.push(value);
    console.log(tasks);
    input.value = " ";
     message.innerText = " ";
    displayTasks();
}

function displayTasks() {
    let taskList = document.getElementById("List");
    let totalTasks = document.getElementById("totalTasks");

    taskList.innerHTML = " ";

    // Loop to display tasks
    for (let i = 0; i < tasks.length; i++)
    {
        let li = document.createElement("li");
        li.innerText = tasks[i];
        taskList.appendChild(li);   
    }
    
    totalTasks.innerHTML = tasks.length;
}

 function darkmode()
                {
                     let body=document.getElementById("body")

                    if(body.classList.contains("dark")) 
                      {  body.classList.remove("dark") } 
                    else
                      {   body.classList.add("dark")  }
                }
    
    </script>
  
</body>
</html>
